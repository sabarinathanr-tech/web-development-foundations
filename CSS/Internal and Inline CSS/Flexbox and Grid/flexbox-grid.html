<!DOCTYPE html>
<html>
<head>
    <title>Flexbox + Grid Layout</title>
    <link rel="icon" href="logo.png">
</head>

<body style="margin: 0; font-family: 'Times New Roman', Times, serif;">

     
    <div style="
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px;
        border: 2px solid black;
    ">
        <div>LOGO</div>
        <div>HOME | ABOUT | CONTACT</div>
    </div>

    <br>

    <div style="
        display: grid;
        grid-template-columns: 1fr 3fr;
        gap: 10px;
        padding: 10px;
        border: 2px dashed red;
    ">

         
        <div style="border: 2px solid blue; padding: 10px;">
            Sidebar
        </div>
         
        <div style="
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        ">

            <div style="border: 2px solid red; padding: 20px;">
                Box 1
            </div>

            <div style="border: 2px solid green; padding: 20px;">
                Box 2
            </div>

            <div style="border: 2px solid purple; padding: 20px;">
                Box 3
            </div>

            <div style="border: 2px solid orange; padding: 20px;">
                Box 4
            </div>

        </div>
    </div>

    <br>

    <div style="
        text-align: center;
        padding: 10px;
        border: 2px solid black;
    ">
        Footer
    </div>

</body>
</html>
