<!DOCTYPE html>
<html>
<head>
    <title>Responsive Design</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f4f4f4;
        }

        h1 {
            margin: 20px;
        }

        
        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .box {
            width: 200px;
            height: 150px;
            background: crimson;
            color: white;
            font-size: 30px;

            display: flex;
            justify-content: center;
            align-items: center;

            transition: 0.3s;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                align-items: center;
            }

            .box {
                width: 300px;
                background: teal;
            }
        }

        @media (max-width: 480px) {
            .box {
                width: 90%;
                background: orange;
                font-size: 20px;
            }
        }

    </style>
</head>

<body>

    <h1>Responsive Layout </h1>

    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
    </div>

</body>
</html>
