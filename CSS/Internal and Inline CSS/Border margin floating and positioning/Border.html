<!DOCTYPE html>
<html>
<head>
    <title>Borders</title>
    <link rel="icon" href="logo.png">
</head>

<body>

    <h1>CSS Borders</h1>

    <div style="border: 3px solid blue; padding: 20px; width: 200px;">
        Solid Border
    </div>

    <br>

    <div style="border: 3px dashed red; padding: 20px; width: 200px;">
        Dashed Border
    </div>

    <br>

    <div style="border: 3px dotted green; padding: 20px; width: 200px;">
        Dotted Border
    </div>

    <br>

    <div style="border: 5px double purple; padding: 20px; width: 200px;">
        Double Border
    </div>

</body>
</html>
