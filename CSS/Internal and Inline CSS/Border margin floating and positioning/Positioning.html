<!DOCTYPE html>
<html>
<head>
    <title>Positioning</title>
    <link rel="icon" href="logo.png">
</head>
<body>
    <h1>Let's see the various types of Positioning</h1>

    <div style="position: relative; border: 2px solid black; height: 200px;">

        <div style="
            position: absolute;
            top: 10px;
            left: 10px;
            border: 2px solid red;
        ">
            Box 1
        </div>

        <div style="
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid green;
        ">
            Box 2
        </div>

        <div style="
            position: absolute;
            bottom: 10px; 
            right:10px;
            border: 2px solid blue;
        ">
            Box 3
        </div>

    </div>

</body>
</html>
