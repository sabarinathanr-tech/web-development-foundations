<!DOCTYPE html>
<html>
<head>
    <title>Transition</title>

    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: Arial;
        }

        h2 {
            margin-bottom: 20px;
        }
        
        .box {
            width: 100px;
            height: 100px;
            background: red;
            transition: all 0.5s ease;
            margin-bottom: 30px;
        }

        .box:hover {
            background: blue;
            transform: translateX(100px) scale(1.2) rotate(15deg);
        }

        .button {
            padding: 10px 20px;
            background: black;
            color: white;
            cursor: crosshair;
            transition: all 0.3s ease;
        }

        .button:hover {
            background: white;
            color: black;
            transform: scale(1.1);
            border: 1px solid black;
        }

    </style>
</head>
<body>

    <h2>Hover Effects</h2>

    <div class="box"></div>

    <div class="button">Hover Button</div>

</body>
</html>
