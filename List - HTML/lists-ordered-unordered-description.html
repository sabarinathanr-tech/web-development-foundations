<!DOCTYPE html>
<html>
<head>
  <title>Lists</title>
  <link rel="icon" href="logo.png">
</head>
<body>
  <h2><i><strong>Ordered list</strong></i></h2>
  
  <ol>
    <li>Code</li>
    <li>Fail</li>
    <li>Learn</li>
    <li>Repeat</li>
  </ol>
  
  <hr>
  
  <h2><i><strong>Unordered list</strong></i></h2>
  
  <ul>
    <li>HTML</li>
    <li>CSS</li>
    <li>JAVA SCRIPT</li>
  </ul>
  
  <hr>
  
  <h2><i><strong>Description list</strong></i></h2>
  
  <dl>
    <dt>HTML</dt>
    <dd>Hyper Text Markup Language</dd>
    
    <dt>CSS</dt>
    <dd>Cascading Style Sheets</dd>
  </dl>
</body>
</html>
