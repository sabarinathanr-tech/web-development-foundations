<!DOCTYPE html>
<html>

<head>
    <title>Embedded Media</title>
    <link rel="icon" href="logo.png">
	
</head>

<body>

    <h2><strong><i>Favourite Things to Do in Free Time</i></strong></h2>

    <div>
        <h3>Favourite Song</h3>

        <audio controls loop preload="auto">
            <source src="music.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div>
        <h3>Favourite Video on Updates</h3>

        <iframe width="560" height="315" 
			src="https://www.youtube.com/embed/MmgRnR0hGN8?si=9ur33KHWO6fDQxel" 
			title="YouTube video player" 
			frameborder="0" 
			allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
			referrerpolicy="strict-origin-when-cross-origin" allowfullscreen>
		</iframe>"
       

    </div>

</body>

</html>x
