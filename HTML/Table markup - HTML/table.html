<!DOCTYPE html>
<html>
<head>
    <title>Table</title>
    <link rel=""icon" href="logo.png">
</head>
<body>
    <h2><i>My first table using html</i></h2>
    <table border="1" width="100" height="100">
	   <caption>Student info</caption>
       <thead>
	      <tr>
	         <th>Name</th>
             <th>Destination</th>
		     <th>Age</th>
             
	      </tr>
	   </thead>
	   <tbody>
	      <tr>
	         <td>sabari</td>
             <td>Tamil Nadu</td>
		     <td>18</td>
             
	      </tr>
          <tr>
             <td>kumar</td>
             <td>Kerala</td>
             <td>19</td>
                
          </tr>
	   
	   </tbody>
	   <tfoot>
	      <tr>
		    <td colspan ="3">End of table</td>
		  </tr>
	   </tfoot>
    </table>
</body>

</html>
